<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" fill="#000000"/>
  
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="512" height="512" fill="url(#grid)"/>
  
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#ffffff" stroke-width="3"/>
  
  <!-- Inner ring (dashed) -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-dasharray="12 8"/>
  
  <!-- MS Text -->
  <text x="256" y="290" font-family="Arial, sans-serif" font-size="180" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="-5">MS</text>
</svg>