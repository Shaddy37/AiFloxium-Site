<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="#000000"/>
  
  <!-- Subtle grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="512" height="512" fill="url(#grid)"/>
  
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#ffffff" stroke-width="3"/>
  
  <!-- Inner ring (dashed) -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-dasharray="12 8"/>
  
  <!-- Central glow -->
  <circle cx="256" cy="256" r="80" fill="url(#coreGlow)"/>
  
  <!-- Solid core -->
  <circle cx="256" cy="256" r="24" fill="#ffffff"/>
  
  <!-- Orbiting elements -->
  <g>
    <circle cx="256" cy="76" r="10" fill="rgba(255,255,255,0.9)"/>
    <line x1="256" y1="256" x2="256" y2="76" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  </g>
  <g>
    <circle cx="411" cy="179" r="10" fill="rgba(255,255,255,0.9)"/>
    <line x1="256" y1="256" x2="411" y2="179" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  </g>
  <g>
    <circle cx="359" cy="389" r="10" fill="rgba(255,255,255,0.9)"/>
    <line x1="256" y1="256" x2="359" y2="389" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  </g>
  <g>
    <circle cx="153" cy="389" r="10" fill="rgba(255,255,255,0.9)"/>
    <line x1="256" y1="256" x2="153" y2="389" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  </g>
  <g>
    <circle cx="101" cy="179" r="10" fill="rgba(255,255,255,0.9)"/>
    <line x1="256" y1="256" x2="101" y2="179" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  </g>
  <g>
    <circle cx="256" cy="436" r="10" fill="rgba(255,255,255,0.9)"/>
    <line x1="256" y1="256" x2="256" y2="436" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  </g>
</svg>